<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GR-Informazione</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;margin:0;padding:20px}
.container{max-width:520px;margin:auto}
.header{text-align:center;margin:20px 0 30px}
h1{margin:0}
.subtitle{color:#666}
.card{display:block;background:#fff;padding:18px;margin:14px 0;border-radius:18px;
text-decoration:none;color:#111;font-size:22px;font-weight:600;
box-shadow:0 2px 10px rgba(0,0,0,.08)}
.footer{text-align:center;color:#666;margin-top:25px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>GR-Informazione</h1>
<div class="subtitle">Portale informativo</div>
<div id="dt"></div>
</div>

<a class="card" href="https://m.dagospia.com" onclick="count('gr_dagospia_click')">📰 Dagospia</a>
<a class="card" href="https://www.fanpage.it" onclick="count('gr_fanpage_click')">📣 Fanpage</a>
<a class="card" href="https://lasintesi.online" onclick="count('gr_lasintesi_click')">📚 La Sintesi</a>

<div class="footer">👥 Visite: <span id="vis">...</span></div>
</div>

<script>
function updateDT(){
 document.getElementById('dt').innerText=new Date().toLocaleString('it-IT');
}
setInterval(updateDT,1000); updateDT();

fetch('https://counterapi.dev/api/gr_home_visits/up')
.then(r=>r.json())
.then(d=>document.getElementById('vis').innerText=d.count)
.catch(()=>{});

function count(name){
 fetch('https://counterapi.dev/api/'+name+'/up');
}
</script>
</body>
</html>
